name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: 🚀 Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend assets (Vite)
        run: |
          npm install
          npm run build

      - name: Upload build assets ke server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "public/build"
          target: ${{ secrets.DEPLOY_PATH }}/public_html/

      - name: Deploy ke Server Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "📥 Fetch dan Reset ke kode terbaru dari GitHub..."
            git fetch origin
            git reset --hard origin/main

            echo "📦 Install PHP dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "🗄️ Jalankan migrasi database..."
            php artisan migrate --force

            echo "📂 Sinkronisasi file public ke public_html..."
            cp -r public/. public_html/
            cp -r public_html/build/public/build/. public_html/build/ 2>/dev/null || true

            echo "🧹 Clear & cache konfigurasi..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:clear

            echo "✅ Deploy selesai!"
