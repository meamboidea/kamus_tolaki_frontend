name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: 🚀 Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend assets (Vite)
        run: |
          npm install
          npm run build

      - name: Upload build assets ke server (Native SCP)
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Bersihkan spasi atau baris baru yang tidak sengaja terikut di GitHub Secrets
          CLEAN_PATH=$(echo "$DEPLOY_PATH" | tr -d '\r\n' | xargs)
          
          scp -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT }} -r public/build ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${CLEAN_PATH}/public/

      - name: Deploy ke Server Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "📥 Fetch dan Reset ke kode terbaru dari GitHub..."
            git fetch origin
            git reset --hard origin/main

            # Cari php binary spesifik jika tersedia di Hostinger
            if [ -f /usr/bin/php8.3 ]; then
              PHP_BIN="/usr/bin/php8.3"
            elif [ -f /opt/alt/php83/usr/bin/php ]; then
              PHP_BIN="/opt/alt/php83/usr/bin/php"
            else
              PHP_BIN="php"
            fi
            
            echo "Using PHP binary: $PHP_BIN"

            echo "📦 Install PHP dependencies..."
            $PHP_BIN /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction || composer install --no-dev --optimize-autoloader --no-interaction

            echo "🗄️ Jalankan migrasi database..."
            $PHP_BIN artisan migrate --force

            echo "🧹 Clear & cache konfigurasi..."
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:clear

            echo "✅ Deploy selesai!"
